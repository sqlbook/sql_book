    account_does_not_exist: An account with this email does not exist
    must_accept_terms: You must accept the Terms Of Service to continue
    unable_to_send_code: We couldn't send your verification code right now. Please try again later or contact support.
    invalid_login_code: Invalid log-in code. Please try again or <a class="link primary" href="%{link}">click here</a> for a replacement code.
    invalid_signup_code: Invalid sign-up code. Please try again or <a class="link primary" href="%{link}">click here</a> for a replacement code.

  mailers:
    account:
      subjects:
        account_deletion_confirmed: Account Deletion Confirmed.
        verify_email_change: Confirm your email change on sqlbook.
    data_source:
      subjects:
        destroy: A data source has been deleted from %{workspace_name}.
    one_time_password:
      subjects:
        login: Your log-in code for Sqlbook
        signup: Your sign-up code for Sqlbook
    workspace:
      subjects:
        invite: You've been invited to join a workspace on sqlbook.
        invite_reject: Invitation rejected.
        workspace_owner_transferred: You've been made the Owner of %{workspace_name}
        workspace_deleted: One of your workspaces has been deleted.
        workspace_member_removed: You've been removed from a workspace.

  models:
    data_source:
      is_not_valid: is not valid
      selected_tables_limit: You can select up to %{count} tables for now
    member:
      roles:
        owner: Owner
        admin: Admin
        user: User
        read_only: Read only
      statuses:
        accepted: Accepted
        pending: Pending

  toasts:
    generic_error:
      title: Something went wrong
      body: We couldn't complete your request, please try again. If the problem continues, contact hello@sqlbook.com.
    account_settings:
      account_deleted_success:
        title: Account successfully deleted
        body: Your account has been deleted and your workspaces have been transferred or destroyed.
      account_delete_failed:
        title: Couldn't delete account
        body: We couldn't delete your account right now. Please try again.
      account_delete_unresolved_workspaces:
        title: Workspace actions required
        body: Please choose a new owner or delete workspace for each listed workspace.
      updated:
        title: Account settings saved
        body: Your account details have been updated.
      update_failed:
        title: Couldn't save account settings
        body: Please check your details and try again.
      email_verification_pending:
        title: Email verification required
        body: "We've sent a verification email to the existing email address associated with this account to confirm the change from %{email_current} to %{email_new}."
      email_verified:
        title: Email address updated
        body: Your email address has been successfully changed.
      email_verification_expired:
        title: Verification link expired
        body: Your verification link has expired. Please re-submit your email change.
      email_unavailable:
        title: Email address unavailable
        body: That email address is already in use. Please choose another.
    invitation:
      invalid:
        title: Invitation no longer valid
        body: This invitation has expired or been revoked.
      pending:
        title: New workspace invitation
        body: You've been invited to join the %{workspace_name} workspace on sqlbook.
    workspaces:
      queries:
        missing:
          title: Query no longer available
          body: The query you were looking for no longer exists.
      updated:
        title: Workspace settings saved
        body: Your workspace name has been updated.
      update_failed:
        title: Couldn't save workspace settings
        body: Please check your workspace name and try again.
      unavailable:
        title: Workspace not available
        body: You don't have permission to access this workspace.
      access_forbidden:
        title: Action not allowed
        body: Your workspace role does not allow this action.
      members:
        invited:
          title: Invitation sent
          body: "%{name} has been invited to this workspace."
        resent:
          title: Invitation resent
          body: "A new invitation has been sent to %{name}."
        resend_failed:
          title: Couldn't resend invitation
          body: Please try again in a moment.
        resend_blocked:
          title: Please wait before resending
          body: You can resend this invitation after %{minutes} minutes.
        deleted:
          title: Team member removed
          body: "%{name} has been removed from this workspace."
        role_updated:
          title: Role change complete
          body: "%{name} now has the role %{role}."
        role_update_failed:
          title: Role change failure
          body: There was an unexpected error when changing the role of your team member. Please try again.
        invite_failed:
          title: Invitation failed
          body: We couldn't send that invitation right now. Please try again.
        already_member:
          title: User is already a member
          body: This user is already in the workspace team.
        owner_invite_forbidden:
          title: Owner invite not allowed
          body: You can't invite a user as owner.
      deleted:
        body: All data has been deleted and affected users have been informed.
      deleted_partial:
        body: Workspace data was deleted, but some users could not be notified by email.
      delete_forbidden:
        title: Workspace deletion not allowed
        body: Only the workspace owner can delete this workspace.
